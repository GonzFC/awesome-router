<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- iOS masks to a rounded square automatically, so use solid background -->
  <rect width="180" height="180" fill="#1e1e2e"/>

  <!-- Outer pulse ring -->
  <circle cx="90" cy="90" r="34" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.3"/>
  <circle cx="90" cy="90" r="46" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.15"/>

  <!-- Three WAN uplinks -->
  <line x1="90" y1="90" x2="152" y2="34" stroke="#a78bfa" stroke-width="8" stroke-linecap="round"/>
  <line x1="90" y1="90" x2="162" y2="90" stroke="#a78bfa" stroke-width="8" stroke-linecap="round"/>
  <line x1="90" y1="90" x2="152" y2="146" stroke="#a78bfa" stroke-width="8" stroke-linecap="round"/>

  <!-- LAN downlink -->
  <line x1="90" y1="90" x2="22" y2="90" stroke="#34d399" stroke-width="8" stroke-linecap="round"/>

  <!-- Endpoint dots -->
  <circle cx="152" cy="34" r="9" fill="#a78bfa"/>
  <circle cx="162" cy="90" r="9" fill="#a78bfa"/>
  <circle cx="152" cy="146" r="9" fill="#a78bfa"/>
  <circle cx="22" cy="90" r="9" fill="#34d399"/>

  <!-- Router core -->
  <circle cx="90" cy="90" r="20" fill="#7c3aed"/>
  <circle cx="90" cy="90" r="7" fill="#ffffff"/>
</svg>
